<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Casa Baglioni · World Cup 2026 family draw. Five players, forty-eight teams, four tiers and a pool. Built for Google Meet screenshare." />
<meta name="theme-color" content="#f4f6f9" />
<meta name="color-scheme" content="light" />
<meta name="apple-mobile-web-app-title" content="Casa Baglioni Draw" />
<link rel="icon" type="image/svg+xml" href="crest.svg" />
<title>Casa Baglioni · World Cup 2026 Draw</title>
<style>
  :root {
    /* Modern off-white surfaces */
    --bg: #f4f6f9;          /* off-white, cool */
    --surface: #ffffff;     /* clean white cards */
    --surface-2: #eef1f5;   /* subtle inset */
    --hairline: #e3e7ee;
    --hairline-soft: #edf0f4;

    /* Ink — kept from the crest */
    --ink: #011818;
    --ink-2: #1e3433;
    --ink-3: #5a6663;
    --ink-4: #a8b0b0;

    /* Tier accents — deep blues, modern */
    --t1: #0a2540;          /* deepest blue */
    --t2: #1d3b66;          /* navy */
    --t3: #2e5599;          /* royal */
    --t4: #4a73b8;          /* steel */
    --pool: #011818;        /* ink — climactic */

    /* Action / highlight */
    --orange: #FF4F00;      /* international orange */

    --accent: var(--t1);

    /* Type scale */
    --serif: "New York", ui-serif, "Iowan Old Style", "Charter", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "Menlo", "Consolas", "Monaco", monospace;

    --fs-cap: 12px;       /* uppercase labels */
    --fs-meta: 14px;      /* secondary text */
    --fs-body: 16px;      /* body */
    --fs-md: 20px;        /* card subhead */
    --fs-lg: 44px;        /* tier title */
    --fs-xl: 64px;        /* hero / final title */
    --fs-hero: 120px;     /* reveal team name */

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-slot: cubic-bezier(0.05, 0.78, 0.1, 1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 500;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Brutalist brand bar — minimalist fill ===== */
  .brand {
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    display: grid;
    grid-template-columns: 1fr 1fr;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-bottom: 2px solid var(--ink);
  }
  .brand-l, .brand-r {
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-l { justify-content: flex-start; }
  .brand-r {
    justify-content: flex-end;
    font-variant-numeric: tabular-nums;
  }
  .brand-r .sep { color: var(--ink-4); }
  .reset-link {
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 0;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .reset-link:hover {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  /* ===== Setup — inherits the global cream palette ===== */
  .setup {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
  }

  /* Crest hero — lingers until dismissed */
  .crest-stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3eadc;
    z-index: 50;
    cursor: pointer;
    transition: opacity 1s var(--ease-out);
  }
  .crest-stage .crest-hint { color: #56635f; }
  .crest-stage .crest-hint .kbd {
    border-color: rgba(1, 24, 24, 0.25);
    color: #011818;
  }
  .crest-stage img {
    width: min(78vmin, 720px);
    height: auto;
    opacity: 0;
    transform: scale(0.96);
    animation: crestIn 1.1s 0.1s forwards var(--ease-out);
  }
  .crest-hint {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #56635f;
    opacity: 0;
    animation: hintIn 1s 1.6s forwards var(--ease-out);
  }
  .crest-hint .kbd {
    display: inline-block;
    padding: 4px 10px;
    margin-left: 8px;
    border: 1px solid rgba(1, 24, 24, 0.25);
    border-radius: 5px;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #011818;
  }
  .crest-stage.dismissed {
    opacity: 0;
    pointer-events: none;
    visibility: hidden;
    transition: opacity 1s var(--ease-out), visibility 0s 1s;
  }
  @keyframes crestIn {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes hintIn {
    to { opacity: 1; }
  }
  .setup-body {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out);
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  .setup-body.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .setup-heading {
    font-family: var(--sans);
    font-size: clamp(48px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1;
    color: var(--ink);
    margin: 0 auto 36px;
    text-align: center;
  }
  .setup-form {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--hairline);
    border: 1.5px solid var(--hairline);
    border-radius: 16px;
    overflow: hidden;
  }
  .setup-form .row {
    display: flex;
    align-items: stretch;
    background: var(--surface);
  }
  .setup-form .row .num {
    width: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-size: 24px;
    font-weight: 700;
    color: var(--ink-4);
    border-right: 1px solid var(--hairline);
    background: var(--bg);
    font-variant-numeric: tabular-nums;
  }
  .setup-form input {
    flex: 1;
    width: 100%;
    background: var(--surface);
    border: none;
    color: var(--ink);
    padding: 22px 24px;
    font-size: 22px;
    font-weight: 600;
    font-family: var(--sans);
    transition: background 0.15s;
    text-align: left;
    letter-spacing: -0.01em;
  }
  .setup-form input::placeholder { color: var(--ink-4); font-weight: 500; letter-spacing: 0; }
  .setup-form input:focus {
    outline: none;
    background: var(--surface-2);
  }
  .setup-actions {
    max-width: 520px;
    width: 100%;
    margin: 20px auto 0;
  }
  .btn {
    width: 100%;
    background: var(--ink);
    color: white;
    border: 2px solid var(--ink);
    padding: 20px 24px;
    border-radius: 0;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    box-shadow: none;
  }
  .btn:hover:not(:disabled) {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }
  .btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
  }
  .btn-ghost:hover {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }
  .btn-accent {
    background: var(--accent);
    color: white;
  }

  /* ===== Draw screen ===== */
  .draw {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 28px;
    padding: 24px 36px 36px;
    max-width: 1680px;
    width: 100%;
    margin: 0 auto;
  }
  .draw-main {
    display: flex;
    flex-direction: column;
    gap: 22px;
    min-width: 0;
  }
  .tier-card {
    display: grid;
    grid-template-columns: 180px 1fr 220px;
    align-items: stretch;
    gap: 0;
    padding: 0;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 0;
    position: relative;
    overflow: hidden;
    box-shadow: none;
    min-height: 140px;
  }
  .tier-card::before { display: none; }
  .tier-card .tier-num {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-style: normal;
    font-weight: 700;
    font-size: 124px;
    line-height: 0.9;
    color: var(--ink);
    letter-spacing: -0.05em;
    padding: 0;
  }
  .tier-card .meta {
    padding: 22px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .tier-card .label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 10px;
  }
  .tier-card h2 {
    font-family: var(--sans);
    font-size: 44px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.025em;
    line-height: 1;
    color: var(--ink);
    text-transform: uppercase;
  }
  .tier-card .progress {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 4px;
    padding: 22px 28px;
    background: var(--surface);
    color: var(--ink);
  }
  .tier-card .progress .n {
    font-family: var(--mono);
    font-style: normal;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
  }
  .tier-card .progress .n .total {
    color: var(--ink-4);
    font-weight: 500;
  }
  .tier-card .progress .cap {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-top: 6px;
  }
  .tier-card.pool-card .progress { background: var(--surface); }

  /* Pick-order strip */
  .order-strip {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 0;
    box-shadow: none;
    overflow: hidden;
  }
  .order-strip .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 8px;
    background: var(--surface);
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .order-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 20px 16px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 0;
    background: transparent;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1.5px solid var(--ink);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .chip .num {
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .chip.current {
    background: var(--orange);
    color: white;
    border-color: var(--orange);
    animation: chipCurrentIn 0.75s 0.15s var(--ease-out) both;
  }
  .chip.current .num { color: rgba(255,255,255,0.7); }
  @keyframes chipCurrentIn {
    0% {
      background: transparent;
      color: var(--ink);
      border-color: var(--ink);
      transform: scale(1);
    }
    40% {
      background: var(--orange);
      color: white;
      border-color: var(--orange);
      transform: scale(1.1);
    }
    100% {
      background: var(--orange);
      color: white;
      border-color: var(--orange);
      transform: scale(1);
    }
  }
  .chip.done {
    opacity: 0.35;
    text-decoration: line-through;
    text-decoration-color: var(--ink);
    text-decoration-thickness: 1.5px;
    animation: chipDoneIn 0.65s 0.15s var(--ease-out) both;
  }
  @keyframes chipDoneIn {
    0% {
      opacity: 1;
      background: var(--orange);
      color: white;
      border-color: var(--orange);
      transform: scale(1);
    }
    100% {
      opacity: 0.35;
      background: transparent;
      color: var(--ink);
      border-color: var(--ink);
      transform: scale(0.96);
    }
  }

  /* Hat preview — teams still in the tier */
  .hat-preview {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 0;
    box-shadow: none;
    overflow: hidden;
  }
  .hat-preview .head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 8px;
    background: var(--surface);
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .hat-flags {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 18px;
    padding: 12px 20px 16px;
  }
  .hat-chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink);
    box-shadow: none;
    transition: opacity 0.4s var(--ease-out);
  }
  .hat-chip .flag-md {
    font-size: 22px;
    line-height: 1;
    filter: none;
  }

  /* Spotlight veil — dims everything except the reel while spinning */
  .spotlight-veil {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0);
    z-index: 50;
    pointer-events: none;
    transition: background 0.25s var(--ease-out);
  }
  body.spotlight .spotlight-veil {
    background: rgba(0, 0, 0, 0.6);
  }
  body.spotlight .reel-stage {
    position: relative;
    z-index: 60;
  }

  /* Reel area */
  .reel-stage {
    flex: 1;
    position: relative;
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 0;
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    gap: 24px;
    min-height: 620px;
    box-shadow: none;
  }

  .turn {
    text-align: left;
    padding-bottom: 4px;
  }
  .turn .label {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    display: block;
    margin-bottom: 6px;
  }
  .turn .name {
    font-family: var(--sans);
    font-size: clamp(64px, 8vw, 96px);
    font-weight: 900;
    color: var(--ink);
    display: block;
    letter-spacing: -0.04em;
    line-height: 0.95;
    text-transform: uppercase;
  }
  .reel-wrapper {
    display: flex;
    justify-content: center;
    padding: 4px 0;
  }

  /* Slot reel — big, theatrical */
  .reel-frame {
    position: relative;
    width: min(820px, 96%);
    height: 390px;
    border-radius: 0;
    background: var(--surface);
    border: 2px solid var(--ink);
    overflow: hidden;
  }
  .reel-frame::before, .reel-frame::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 130px;
    pointer-events: none;
    z-index: 3;
  }
  .reel-frame::before {
    top: 0;
    background: linear-gradient(180deg, var(--surface) 30%, transparent 100%);
  }
  .reel-frame::after {
    bottom: 0;
    background: linear-gradient(0deg, var(--surface) 30%, transparent 100%);
  }
  .reel-center {
    position: absolute;
    top: 130px;
    left: 0; right: 0;
    height: 130px;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    background: transparent;
    pointer-events: none;
    z-index: 2;
  }
  /* Side pointer arrows aimed at the center row */
  .reel-center::before, .reel-center::after {
    content: "";
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-style: solid;
  }
  .reel-center::before {
    left: -1px;
    border-width: 12px 0 12px 14px;
    border-color: transparent transparent transparent var(--ink);
  }
  .reel-center::after {
    right: -1px;
    border-width: 12px 14px 12px 0;
    border-color: transparent var(--ink) transparent transparent;
  }
  .reel-track {
    position: absolute;
    top: 0; left: 0; right: 0;
    will-change: transform;
  }
  .reel-row {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 0 48px;
    color: var(--ink);
    position: relative;
    background: var(--team-tint, transparent);
  }
  .reel-row::before {
    content: "";
    position: absolute;
    left: 0; top: 14px; bottom: 14px;
    width: 8px;
    background: var(--team-color, var(--ink));
    border-radius: 0 4px 4px 0;
  }
  .reel-row::after {
    content: "";
    position: absolute;
    right: 0; top: 14px; bottom: 14px;
    width: 8px;
    background: var(--team-color, var(--ink));
    border-radius: 4px 0 0 4px;
  }
  .reel-row .flag {
    font-size: 72px;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
  }
  .reel-row .name {
    font-family: var(--sans);
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .reel-idle {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-4);
    font-size: var(--fs-cap);
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    z-index: 1;
  }

  /* Spin button */
  .spin-controls {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    margin-top: auto;
  }
  .spin-btn {
    background: var(--surface);
    color: var(--ink);
    border: 2px solid var(--ink);
    width: 100%;
    padding: 22px 24px;
    border-radius: 0;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    font-family: var(--mono);
    touch-action: manipulation;
    box-shadow: none;
  }
  .spin-btn:hover:not(:disabled) {
    filter: none;
    background: var(--ink);
    color: white;
  }
  .spin-btn.holding {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    transform: none;
  }
  .spin-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .spin-hint {
    color: var(--ink-3);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
  }

  /* ===== Rosters ===== */
  .rosters {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    max-height: calc(100vh - 60px);
    padding-right: 4px;
  }
  .rosters::-webkit-scrollbar { width: 6px; }
  .rosters::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }
  .roster {
    background: var(--surface);
    border: 2px solid var(--ink);
    border-radius: 0;
    padding: 0;
    transition: background 0.15s, color 0.15s;
    box-shadow: none;
  }
  .roster.active {
    background: var(--surface);
    color: var(--ink);
    border-width: 3px;
    margin: -1px;
  }
  .roster.active::after {
    content: "";
    position: absolute;
    left: -3px; top: -3px; bottom: -3px;
    width: 4px;
    background: var(--orange);
  }
  .roster { position: relative; }
  .roster-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    margin-bottom: 0;
  }
  .roster-name-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .roster-head .name {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .roster.active .roster-head .name { color: var(--ink); }
  .redo-badge {
    width: 22px;
    height: 22px;
    border-radius: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
  }
  .redo-badge.available {
    background: var(--orange);
    color: white;
    animation: none;
    box-shadow: none;
  }
  .redo-badge.spent {
    background: transparent;
    border: 1.5px solid var(--ink-3);
    color: var(--ink-3);
    position: relative;
    overflow: hidden;
  }
  .redo-badge.spent::after {
    content: "";
    position: absolute;
    left: -2px;
    right: -2px;
    top: 50%;
    height: 1.5px;
    background: var(--ink-3);
    transform: rotate(-30deg);
  }
  .roster.active .redo-badge.spent {
    border-color: var(--ink-3);
    color: var(--ink-3);
  }
  .roster.active .redo-badge.spent::after { background: var(--ink-3); }
  .roster-head .total {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
  }
  .roster.active .roster-head .total { color: var(--ink-3); }
  .roster-grid {
    display: flex;
    flex-direction: column;
    flex-wrap: nowrap;
    gap: 0;
    padding: 0;
  }
  .roster-grid:empty { padding: 0; }
  .pick {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    background: transparent;
    border: none;
    border-radius: 0;
    border-left: 4px solid var(--tier-color, var(--ink));
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .roster.active .pick { color: var(--ink); }
  .pick .flag-sm { font-size: 16px; line-height: 1; }
  .pick:last-child { border-bottom: none; }
  .pick .pick-name { flex: 1; }
  .pick .pick-tag {
    color: var(--ink-3);
    font-family: var(--mono);
    margin-left: auto;
  }
  .roster.active .pick .pick-tag { color: var(--ink-3); }

  /* The House — split-pot pseudo-player */
  .roster.house {
    background: color-mix(in srgb, var(--orange) 8%, var(--surface));
    border-color: var(--orange);
  }
  .roster.house .roster-head .name { color: var(--orange); }
  .roster.house .roster-head .total { color: var(--orange); }
  .roster.house .pick { border-left-color: var(--orange); }
  .roster.house .pick .pick-tag { color: var(--orange); }

  .recap-column.house {
    background: color-mix(in srgb, var(--orange) 8%, var(--surface));
  }
  .recap-column.house .recap-col-head .name { color: var(--orange); }
  .recap-column.house .recap-col-head .count { color: var(--orange); }
  .recap-column.house .recap-pick { border-left-color: var(--orange); }

  .final-card.house {
    background: color-mix(in srgb, var(--orange) 8%, var(--surface));
    border-color: var(--orange);
  }
  .final-card.house h3 { color: var(--orange); }
  .final-card.house .ct { color: var(--orange); }
  .final-card.house .pick { border-left-color: var(--orange); }
  .final-card.house .pick .pick-tag { color: var(--orange); }
  .final-card.house .tier-label { color: var(--orange); }
  .pick.new { animation: flashIn 0.6s var(--ease-out); }
  @keyframes flashIn {
    0% { background: var(--accent); color: var(--surface); transform: scale(0.9); }
    100% { background: var(--surface-2); color: var(--ink); transform: scale(1); }
  }

  /* ===== Reveal overlay ===== */
  .reveal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: var(--reveal-bg, #0e1626);
    animation: revealIn 0.3s var(--ease-out);
  }
  @keyframes revealIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  .reveal-inner {
    position: relative;
    text-align: center;
    max-width: 720px;
    width: 100%;
  }
  .reveal .eyebrow {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    margin-bottom: 16px;
    animation: rise 0.35s 0s both var(--ease-out);
  }
  .reveal .picker-name {
    font-family: var(--sans);
    font-size: clamp(72px, 9vw, 108px);
    font-weight: 900;
    color: white;
    margin: 0 0 4px;
    line-height: 0.92;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    text-shadow: 0 6px 24px rgba(0,0,0,0.25);
    animation: rise 0.4s 0.05s both var(--ease-out);
  }
  .reveal .picker-verb {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin: 0 0 18px;
    animation: rise 0.35s 0.12s both var(--ease-out);
  }
  .reveal .pick-flag {
    font-size: clamp(120px, 16vw, 180px);
  }
  .reveal .team {
    font-size: clamp(60px, 8vw, 88px);
  }
  .reveal .pick-flag {
    font-size: clamp(140px, 18vw, 220px);
    line-height: 1;
    margin: 24px 0;
    animation: pop 0.5s 0.15s both var(--ease-out);
  }
  .reveal .team {
    font-family: var(--sans);
    font-size: clamp(72px, 10vw, var(--fs-hero));
    font-weight: 900;
    color: white;
    margin: 0 0 18px;
    line-height: 0.9;
    letter-spacing: -0.045em;
    text-transform: uppercase;
    animation: rise 0.4s 0.18s both var(--ease-out);
  }
  .reveal .pick-meta {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin: 0 0 32px;
    animation: rise 0.35s 0.25s both var(--ease-out);
  }
  .reveal .continue {
    background: transparent;
    color: white;
    border: 2px solid white;
    padding: 18px 40px;
    border-radius: 0;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: var(--mono);
    animation: rise 0.35s 0.32s both var(--ease-out);
    transition: background 0.12s, color 0.12s;
    box-shadow: none;
  }
  .reveal .continue:hover {
    background: white;
    color: var(--ink);
    opacity: 1;
  }
  .reveal .keyhint {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    animation: rise 0.4s 0.38s both var(--ease-out);
  }
  .reveal .redo-action {
    display: inline-flex;
    margin: 14px auto 0;
    background: transparent;
    color: rgba(255,255,255,0.85);
    border: 1.5px solid rgba(255,255,255,0.45);
    padding: 12px 22px;
    border-radius: 0;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    animation: rise 0.45s 0.45s both var(--ease-out);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    align-items: center;
    gap: 10px;
  }
  .reveal .redo-action:hover {
    background: var(--orange);
    color: white;
    border-color: var(--orange);
  }
  .reveal .redo-action .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--orange);
    color: white;
    padding: 2px 8px;
    border-radius: 0;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .reveal .redo-action:hover .pill {
    background: rgba(0,0,0,0.25);
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes rise {
    0% { transform: translateY(14px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* ===== Redo takeover — big-deal animation ===== */
  .redo-stage {
    position: fixed;
    inset: 0;
    z-index: 120;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--redo-color, #0a2540);
    animation: redoIn 0.25s var(--ease-out);
  }
  @keyframes redoIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  .redo-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255, 79, 0, 0.55), transparent 65%),
      linear-gradient(135deg, rgba(0,0,0,0.55), rgba(0,0,0,0.85));
    animation: redoShake 0.55s 0.45s var(--ease-out);
  }
  @keyframes redoShake {
    0%, 100% { transform: translate(0, 0); }
    15% { transform: translate(-14px, 6px); }
    30% { transform: translate(10px, -5px); }
    45% { transform: translate(-7px, 4px); }
    60% { transform: translate(5px, -2px); }
    75% { transform: translate(-3px, 1px); }
  }
  .redo-stamp {
    position: relative;
    z-index: 2;
    font-family: var(--sans);
    font-size: clamp(140px, 22vw, 280px);
    font-weight: 900;
    color: white;
    letter-spacing: -0.06em;
    line-height: 0.9;
    text-transform: uppercase;
    transform: rotate(-8deg);
    text-shadow:
      6px 6px 0 rgba(255, 79, 0, 0.9),
      0 12px 36px rgba(0,0,0,0.6);
    -webkit-text-stroke: 3px rgba(0,0,0,0.3);
    animation: redoSlam 0.55s var(--ease-out) both;
  }
  @keyframes redoSlam {
    0% {
      transform: translate(60vw, -20vh) rotate(40deg) scale(2.4);
      opacity: 0;
    }
    65% {
      transform: translate(-12px, 6px) rotate(-12deg) scale(1.06);
      opacity: 1;
    }
    100% {
      transform: translate(0, 0) rotate(-8deg) scale(1);
      opacity: 1;
    }
  }
  .redo-meta {
    position: absolute;
    bottom: 12vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    z-index: 2;
    animation: rise 0.6s 0.85s both var(--ease-out);
  }
  .redo-player {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .redo-team {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    font-size: clamp(18px, 2vw, 24px);
    font-weight: 600;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 12px 22px;
    border-radius: 12px;
    position: relative;
  }
  .redo-team-flag {
    font-size: clamp(28px, 3vw, 40px);
    line-height: 1;
  }
  .redo-team-name {
    position: relative;
  }
  .redo-team-name::after {
    content: "";
    position: absolute;
    left: -8px;
    right: -8px;
    top: 50%;
    height: 4px;
    background: var(--orange);
    transform: scaleX(0);
    transform-origin: left;
    animation: strikeOut 0.45s 1.3s both var(--ease-out);
  }
  @keyframes strikeOut {
    to { transform: scaleX(1); }
  }
  .redo-token-flip {
    position: absolute;
    top: 8vh;
    right: 8vw;
    width: clamp(70px, 9vw, 110px);
    height: clamp(70px, 9vw, 110px);
    border-radius: 50%;
    background: var(--orange);
    color: white;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 16px 40px -10px rgba(0,0,0,0.5);
    animation: tokenFlip 1.2s 0.45s both var(--ease-out);
    z-index: 2;
  }
  @keyframes tokenFlip {
    0% { transform: rotateY(0) scale(1); opacity: 1; }
    35% { transform: rotateY(360deg) scale(1.18); opacity: 1; }
    70% { transform: rotateY(720deg) scale(1) translateY(20px); opacity: 0.8; }
    100% { transform: rotateY(1080deg) scale(0.2) translateY(60px); opacity: 0; }
  }

  /* ===== End-of-round recap — current rosters per player ===== */
  .recap {
    position: fixed;
    inset: 0;
    z-index: 80;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    animation: revealIn 0.4s var(--ease-out);
    overflow-y: auto;
  }
  .recap-inner {
    text-align: center;
    max-width: 1180px;
    width: 100%;
  }
  .recap-eyebrow {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .recap-heading {
    font-family: var(--sans);
    font-size: clamp(56px, 7vw, 88px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0 0 12px;
    color: var(--ink);
    text-transform: uppercase;
  }
  .recap-sub {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 36px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .recap-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 0;
    margin: 0 auto 36px;
    border: 2px solid var(--ink);
    background: var(--surface);
    text-align: left;
  }
  .recap-column {
    border-right: 1.5px solid var(--ink);
    display: flex;
    flex-direction: column;
  }
  .recap-column:last-child { border-right: none; }
  .recap-col-head {
    padding: 14px 18px 10px;
  }
  .recap-col-head .name {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1;
  }
  .recap-col-head .count {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-top: 4px;
  }
  .recap-col-picks {
    padding: 4px 0 12px;
    display: flex;
    flex-direction: column;
  }
  .recap-pick {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    border-left: 4px solid var(--tier-color, var(--ink));
  }
  .recap-pick.fresh {
    background: var(--surface-2);
    animation: recapPickIn 0.5s var(--ease-out) both;
  }
  @keyframes recapPickIn {
    from { opacity: 0; transform: translateX(-8px); background: var(--orange); color: white; }
    to { opacity: 1; transform: translateX(0); }
  }
  .recap-pick .flag-sm { font-size: 16px; line-height: 1; }
  .recap-empty {
    padding: 12px 18px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-4);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .recap-continue {
    width: auto;
    display: inline-block;
    padding: 18px 44px;
  }
  .recap-keyhint {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  @media (max-width: 1100px) {
    .recap-grid {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .recap-column {
      border-right: 1.5px solid var(--ink);
      border-bottom: 1.5px solid var(--ink);
    }
  }

  /* ===== Tier preview — list of all teams in the upcoming bucket ===== */
  .preview {
    position: fixed;
    inset: 0;
    z-index: 80;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    animation: revealIn 0.4s var(--ease-out);
    overflow-y: auto;
  }
  .preview-inner {
    text-align: center;
    max-width: 880px;
    width: 100%;
  }
  .preview-eyebrow {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .preview-heading {
    font-family: var(--sans);
    font-size: clamp(56px, 7vw, 88px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0 0 12px;
    color: var(--ink);
    text-transform: uppercase;
  }
  .preview-sub {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 36px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
    margin: 0 auto 36px;
    max-width: 820px;
    border: 2px solid var(--ink);
    background: var(--surface);
  }
  .preview-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: transparent;
    border: none;
    border-left: 5px solid var(--team-color, var(--accent));
    border-radius: 0;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;

    transform: translateY(8px);

  }
  @keyframes cardIn {

  }
  .preview-flag {
    font-size: 26px;
    line-height: 1;

  }
  .preview-team {
    letter-spacing: -0.01em;
  }
  .preview-continue {
    width: auto;

  }
  .preview-keyhint {
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* ===== Tier intro — animated pick-order shuffle ===== */
  .intro {
    position: fixed;
    inset: 0;
    z-index: 80;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    animation: revealIn 0.4s var(--ease-out);
  }
  .intro-inner {
    text-align: center;
    max-width: 560px;
    width: 100%;
  }
  .intro-prev {
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1.5px solid var(--ink);
  }
  .intro-prev .eyebrow {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }
  .intro-prev .sub {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .intro-eyebrow {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .intro-heading {
    font-family: var(--sans);
    font-size: clamp(56px, 7vw, 88px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.95;
    margin: 0 0 12px;
    color: var(--ink);
    text-transform: uppercase;
  }
  .intro-sub {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 36px;
    font-weight: 500;
    letter-spacing: 0.2em;

  /* Confetti — hard brutalist squares */
  .confetti-piece {

  @keyframes confettiFall {

  .final-card h3 {

  /* Resume banner on the setup screen */
  .resume-bar {

  }
  .resume-btn {

    color: white;

    padding: 10px 18px;

  .resume-btn:hover { filter: brightness(1.05); }
  .resume-discard {
    background: transparent;
    color: var(--ink-3);
    border: 1px solid var(--hairline);

    border-radius: 8px;

    font-weight: 600;
