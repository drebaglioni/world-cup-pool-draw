    font-family: var(--sans);
    transition: color 0.15s, border-color 0.15s;
  }
  .resume-discard:hover { color: var(--ink); border-color: var(--ink-3); }

  /* ===== Responsive ===== */
  @media (max-width: 980px) {
    .draw { grid-template-columns: 1fr; padding: 16px; }
    .rosters { max-height: none; }
    .reel-row .flag { font-size: 40px; }
    .reel-row .name { font-size: 26px; }
    .brand { padding: 16px 20px 0; }
  }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
/* =========================================================================
   Data — teams by tier
   ========================================================================= */
const TIERS = [
  {
    name: "Favorites",
    subtitle: "Tier 1",
    color: "--t1",
    teams: [
      ["France","FR"], ["Spain","ES"], ["England","GB-ENG"], ["Portugal","PT"],
      ["Brazil","BR"], ["Argentina","AR"], ["Germany","DE"], ["Netherlands","NL"],
      ["Norway","NO"], ["Japan","JP"], ["Colombia","CO"], ["Belgium","BE"],
    ],
  },
  {
    name: "Contenders",
    subtitle: "Tier 2",
    color: "--t2",
    teams: [
      ["Morocco","MA"], ["USA","US"], ["Switzerland","CH"], ["Uruguay","UY"],
      ["Mexico","MX"], ["Croatia","HR"], ["Ecuador","EC"], ["Senegal","SN"],
      ["South Korea","KR"], ["Türkiye","TR"], ["Austria","AT"], ["Iran","IR"],
    ],
  },
  {
    name: "Dark Horses",
    subtitle: "Tier 3",
    color: "--t3",
    teams: [
      ["Australia","AU"], ["Algeria","DZ"], ["Canada","CA"], ["Egypt","EG"],
      ["Ivory Coast","CI"], ["Panama","PA"], ["Sweden","SE"], ["Czechia","CZ"],
      ["Paraguay","PY"], ["Scotland","GB-SCT"], ["DR Congo","CD"], ["Tunisia","TN"],
    ],
  },
  {
    name: "Underdogs",
    subtitle: "Tier 4",
    color: "--t4",
    teams: [
      ["Uzbekistan","UZ"], ["Iraq","IQ"], ["Qatar","QA"], ["South Africa","ZA"],
      ["Saudi Arabia","SA"], ["Jordan","JO"], ["Bosnia-Herzegovina","BA"], ["Cape Verde","CV"],
      ["Ghana","GH"], ["Curaçao","CW"], ["Haiti","HT"], ["New Zealand","NZ"],
    ],
  },
];

/* Per-team primary colors (drawn from flag identity). Used to tint the reveal screen. */
const TEAM_COLORS = {
  FR: "#0055A4", ES: "#C60B1E", "GB-ENG": "#CE1124", PT: "#006600",
  BR: "#009C3B", AR: "#74ACDF", DE: "#1F1F1F", NL: "#FF6600",
  NO: "#BA0C2F", JP: "#BC002D", CO: "#FCD116", BE: "#FAE042",
  MA: "#C1272D", US: "#3C3B6E", CH: "#DA291C", UY: "#7AB3E2",
  MX: "#006847", HR: "#171796", EC: "#FFD100", SN: "#00853F",
  KR: "#003478", TR: "#E30A17", AT: "#ED2939", IR: "#239F40",
  AU: "#00247D", DZ: "#006233", CA: "#D52B1E", EG: "#CE1126",
  CI: "#FF8200", PA: "#005AA7", SE: "#006AA7", CZ: "#11457E",
  PY: "#D52B1E", "GB-SCT": "#005EB8", CD: "#007FFF", TN: "#E70013",
  UZ: "#0099B5", IQ: "#CE1126", QA: "#8D1B3D", ZA: "#007749",
  SA: "#006C35", JO: "#007A3D", BA: "#002F6C", CV: "#003893",
  GH: "#FCD116", CW: "#002B7F", HT: "#00209F", NZ: "#012169",
};

const POOL_COLOR = "#7d9fc7";

/* =========================================================================
   Flag rendering
   ========================================================================= */
function flagFor(code) {
  if (code === "GB-ENG") return "🏴\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}";
  if (code === "GB-SCT") return "🏴\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}";
  const base = 0x1F1E6;
  return [...code.toUpperCase()].map(c =>
    String.fromCodePoint(base + c.charCodeAt(0) - 65)
  ).join("");
}

/* =========================================================================
   Utilities
   ========================================================================= */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "style") e.style.cssText = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === true) e.setAttribute(k, "");
    else if (v === false || v == null) {}
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}
function darken(hex, amt = 0.5) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return hex;
  const r = Math.round(parseInt(m[1], 16) * amt);
  const g = Math.round(parseInt(m[2], 16) * amt);
  const b = Math.round(parseInt(m[3], 16) * amt);
  return `rgb(${r}, ${g}, ${b})`;
}

/* =========================================================================
   State
   ========================================================================= */
const PICKS_PER_PLAYER_PER_TIER = 2; // 5 players × 2 = 10 picks per tier; 2 leftovers per tier → pool

const state = {
  phase: "setup",      // setup | intro | tierPreview | draw | reveal | redoing | pool | recap | done
  players: [],         // [{name, picks:[{name,code,tierIdx,fromPool}]}]
  tierIndex: 0,
  remaining: [],       // current tier hat (or pool hat when phase=pool)
  pickOrder: [],
  pickCursor: 0,
  picksThisRound: 0,   // count of picks taken from this tier so far (0..10), or pool (0..8)
  spinning: false,
  pendingPick: null,   // team object awaiting reveal commit
  newPickKey: null,
  pool: [],            // teams left over from each tier
  intoPool: false,     // next intro is for the final pool, not a tier
  redoTeam: null,      // team being rejected during redo animation
  redoPlayer: null,    // player using their redo token
  house: { name: "The House", picks: [] },  // unpicked pool leftovers — money split if any wins
};

const POOL_PICKS_PER_PLAYER = 1; // pool gives everyone +1 → all land on 9, leftovers go to The House

function currentColorVar() {
  return state.phase === "pool" ? "--pool" : TIERS[state.tierIndex].color;
}
function applyAccent() {
  document.documentElement.style.setProperty("--accent", `var(${currentColorVar()})`);
}

/* =========================================================================
   Setup screen
   ========================================================================= */
function renderSetup(root) {
  applyAccent();
  const inputs = Array.from({ length: 5 }, (_, i) =>
    el("input", {
      type: "text",
      placeholder: `Name`,
      maxlength: "20",
      autocomplete: "off",
      onInput: updateBtn,
      onKeydown: (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          if (i < 4) inputs[i + 1].focus();
          else if (!startBtn.disabled) startBtn.click();
        }
      },
    })
  );
  const rows = inputs.map((inp, i) =>
    el("div", { class: "row" },
      el("div", { class: "num" }, String(i + 1)),
      inp,
    )
  );
  const startBtn = el("button", { class: "btn", disabled: true, onClick: onStart }, "Begin draw");

  function updateBtn() {
    const names = inputs.map(i => i.value.trim());
    const unique = new Set(names.filter(Boolean));
    startBtn.disabled = !(names.every(Boolean) && unique.size === 5);
  }
  function onStart() {
    const names = inputs.map(i => i.value.trim());
    state.players = names.map(n => ({ name: n, picks: [], redoTokens: 1 }));
    state.tierIndex = 0;
    state.intoPool = false;
    state.pool = [];
    state.house = { name: "The House", picks: [] };
    state.pickOrder = shuffle(state.players.map((_, i) => i));
    state.phase = "intro";
    applyAccent();
    render();
  }

  root.appendChild(el("div", { class: "brand" },
    el("div", { class: "mark" }, el("span", { class: "dot" }), el("span", {}, "Casa Baglioni")),
    el("span", {}, "Draw"),
  ));

  const crestImg = el("img", { src: "crest.svg", alt: "Casa Baglioni" });
  const crestHint = el("div", { class: "crest-hint" },
    "Press",
    el("span", { class: "kbd" }, "space"),
  );
  const crestStage = el("div", { class: "crest-stage" }, crestImg, crestHint);
  const setupBody = el("div", { class: "setup-body" },
    el("h1", { class: "setup-heading" }, "Players"),
    el("div", { class: "setup-form" }, ...rows),
    el("div", { class: "setup-actions" }, startBtn),
  );

  let dismissed = false;
  function dismissCrest() {
    if (dismissed) return;
    dismissed = true;
    crestStage.classList.add("dismissed");
    setupBody.classList.add("revealed");
    setTimeout(() => inputs[0].focus(), 700);
    window.removeEventListener("keydown", crestKey);
  }
  function crestKey(e) {
    if (state.phase !== "setup") {
      window.removeEventListener("keydown", crestKey);
      return;
    }
    if (e.code === "Space" || e.code === "Enter") {
      e.preventDefault();
      dismissCrest();
    }
  }
  window.addEventListener("keydown", crestKey);
  crestStage.addEventListener("click", dismissCrest);

  /* Resume banner — if a draw was in progress, offer to pick it up */
  const snap = loadSnapshot();
  if (snap && snap.phase !== "done" && snap.players?.length === 5) {
    let where;
    if (snap.phase === "intro") {
      where = snap.intoPool ? "Pool · ready" : `${TIERS[snap.tierIndex]?.subtitle || "Tier"} · ready`;
    } else if (snap.phase === "pool") {
      where = `Final pool · ${snap.picksThisRound || 0}/8`;
    } else {
      where = `${TIERS[snap.tierIndex]?.subtitle || "Draw"} · ${snap.picksThisRound || 0}/10`;
    }
    const resumeBar = el("div", { class: "resume-bar" },
      el("div", { class: "resume-meta" },
        el("span", { class: "resume-eyebrow" }, "In progress"),
        el("span", { class: "resume-where" }, where),
      ),
      el("div", { class: "resume-actions" },
        el("button", { class: "resume-btn", onClick: () => restoreSnapshot(snap) }, "Resume"),
        el("button", { class: "resume-discard", onClick: () => { clearSnapshot(); render(); } }, "Discard"),
      ),
    );
    setupBody.insertBefore(resumeBar, setupBody.firstChild);
  }

  root.appendChild(el("div", { class: "setup" }, setupBody, crestStage));
}

/* =========================================================================
   Draw flow
   ========================================================================= */
function beginTier(idx) {
  state.tierIndex = idx;
  state.remaining = TIERS[idx].teams.map(([name, code]) => ({ name, code }));
  state.pickOrder = shuffle(state.players.map((_, i) => i));
  state.pickCursor = 0;
  state.picksThisRound = 0;
  state.pendingPick = null;
  state.spinning = false;
  state.phase = "draw";
  applyAccent();
  render();
}

function beginPool() {
  state.remaining = state.pool.slice();
  state.pickOrder = shuffle(state.players.map((_, i) => i));
  state.pickCursor = 0;
  state.picksThisRound = 0;
  state.pendingPick = null;
  state.spinning = false;
  state.phase = "pool";
  applyAccent();
  render();
}

function activePlayerIdx() {
  if (!state.pickOrder.length) return null;
  return state.pickOrder[state.pickCursor % state.pickOrder.length];
}
function currentRound() {
  return Math.floor(state.pickCursor / state.pickOrder.length);
}
function isPoolPhase() {
  return state.phase === "pool";
}
function picksTargetThisPhase() {
  return isPoolPhase()
    ? 8
    : state.players.length * PICKS_PER_PLAYER_PER_TIER; // 10
}

/* =========================================================================
   Draw screen render
   ========================================================================= */
function renderDraw(root) {
  applyAccent();
  const inPool = isPoolPhase();
  const tier = TIERS[state.tierIndex];

  const activeIdx = activePlayerIdx();
  const activePlayer = state.players[activeIdx];

  const tierTag = inPool
    ? "Pool"
    : "Tier " + String(state.tierIndex + 1).padStart(2, "0") + "/04";
  const roundTag = "Round " + String(currentRound() + 1).padStart(2, "0");
  root.appendChild(el("div", { class: "brand" },
    el("div", { class: "brand-l" },
      el("span", {}, "Casa Baglioni / WC 2026"),
    ),
    el("div", { class: "brand-r" },
      el("span", {}, roundTag),
      el("span", { class: "sep" }, "|"),
      el("span", {}, tierTag),
      el("span", { class: "sep" }, "|"),
      el("button", { class: "reset-link", onClick: confirmReset }, "Reset"),
    ),
  ));

  /* Tier card — editorial */
  const target = picksTargetThisPhase();
  const remainingPicks = target - state.picksThisRound;
  const tierCard = inPool
    ? el("div", { class: "tier-card pool-card" },
        el("div", { class: "tier-num" }, "P"),
        el("div", { class: "meta" },
          el("div", { class: "label" }, "Final"),
          el("h2", {}, "Pool"),
        ),
        el("div", { class: "progress" },
          el("div", { class: "n" }, String(remainingPicks), el("span", { class: "total" }, " / " + target)),
          el("div", { class: "cap" }, "Picks left"),
        ),
      )
    : el("div", { class: "tier-card" },
        el("div", { class: "tier-num" }, String(state.tierIndex + 1)),
        el("div", { class: "meta" },
          el("div", { class: "label" }, tier.subtitle),
          el("h2", {}, tier.name),
        ),
        el("div", { class: "progress" },
          el("div", { class: "n" }, String(remainingPicks), el("span", { class: "total" }, " / " + target)),
          el("div", { class: "cap" }, "Picks left"),
        ),
      );

  /* Pick-order strip */
  const round = currentRound();
  const posInRound = state.pickCursor % state.pickOrder.length;
  const orderChips = state.pickOrder.map((pIdx, i) => {
    let cls = "chip";
    if (i === posInRound) cls += " current";
    else if (i < posInRound) cls += " done";
    return el("div", { class: cls },
      el("span", { class: "num" }, String(i + 1)),
      state.players[pIdx].name,
    );
  });
  const orderStrip = el("div", { class: "order-strip" },
    el("div", { class: "head" },
      el("span", {}, "Order · Round " + String(currentRound() + 1).padStart(2, "0")),
      !inPool && state.pool.length > 0 ? el("span", {}, state.pool.length + " in pool") : null,
    ),
    el("div", { class: "order-chips" }, ...orderChips),
  );

  /* Reel stage */
  const reelFrame = el("div", { class: "reel-frame", id: "reel-frame" },
    el("div", { class: "reel-center" }),
    el("div", { class: "reel-track", id: "reel-track" }),
    el("div", { class: "reel-idle", id: "reel-idle" }),
  );

  const spinBtn = el("button", {
    class: "spin-btn",
    id: "spin-btn",
  }, "Hold to draw");
  attachHoldHandlers(spinBtn);

  const pickerLabel = "[ Picker · " +
    String(state.pickCursor % state.players.length + 1).padStart(2, "0") +
    "/" + String(state.players.length).padStart(2, "0") + " ]";
  const reelStage = el("div", { class: "reel-stage" },
    el("div", { class: "turn" },
      el("span", { class: "label" }, pickerLabel),
      el("span", { class: "name" }, activePlayer ? activePlayer.name : ""),
    ),
    el("div", { class: "reel-wrapper" }, reelFrame),
    el("div", { class: "spin-controls" },
      spinBtn,
      el("div", { class: "spin-hint" }, "[ Space ]"),
    ),
  );

  /* Hat preview — what's still in the hat */
  const hatPreview = el("div", { class: "hat-preview" },
    el("div", { class: "head" },
      el("span", {}, "In the hat · " + state.remaining.length + " remaining"),
    ),
    el("div", { class: "hat-flags" },
      ...state.remaining.map((t, i) => el("div", { class: "hat-chip", title: t.name },
        el("span", { class: "flag-md" }, flagFor(t.code)),
        el("span", {}, t.name),
      )),
    ),
  );

  const main = el("div", { class: "draw-main" }, tierCard, orderStrip, reelStage, hatPreview);

  /* Rosters */
  const rosterCards = state.players.map((p, i) => renderRoster(p, i, i === activeIdx));
  if (inPool || state.intoPool) {
    rosterCards.push(renderHouseRoster());
  }
  const rostersEl = el("div", { class: "rosters" }, ...rosterCards);

  root.appendChild(el("div", { class: "draw" }, main, rostersEl));
  root.appendChild(el("div", { class: "spotlight-veil" }));

  // Populate reel with static teams so the slot doesn't look empty
  paintIdleReel();
}

function renderHouseRoster() {
  const picks = state.house?.picks || [];
  const grid = el("div", { class: "roster-grid" },
    ...picks.map(pick => el("div", {
      class: "pick",
      style: `--tier-color: var(--orange);`,
      title: pick.name + " · House",
    },
      el("span", { class: "flag-sm" }, flagFor(pick.code)),
      el("span", { class: "pick-name" }, pick.name),
      el("span", { class: "pick-tag" }, "· House"),
    )),
  );
  const countLabel = picks.length === 0 ? "Pending" : picks.length + " teams";
  return el("div", { class: "roster house" },
    el("div", { class: "roster-head" },
      el("div", { class: "roster-name-wrap" },
        el("div", { class: "name" }, "The House"),
      ),
      el("div", { class: "total" }, countLabel),
    ),
    grid,
  );
}

function renderRoster(player, idx, isActive) {
  const total = player.picks.length;
  const grid = el("div", { class: "roster-grid" },
    ...player.picks.map(pick => {
      const key = `${idx}-${pick.code}`;
      const cls = "pick" + (state.newPickKey === key ? " new" : "");
      const colorVar = pick.fromPool ? "--pool" : TIERS[pick.tierIdx].color;
      const tag = pick.fromPool ? "Pool" : "T" + String(pick.tierIdx + 1).padStart(2, "0");
      return el("div", {
        class: cls,
        style: `--tier-color: var(${colorVar});`,
        title: `${pick.name} · ${pick.fromPool ? "Pool" : TIERS[pick.tierIdx].subtitle}`,
      },
        el("span", { class: "flag-sm" }, flagFor(pick.code)),
        el("span", { class: "pick-name" }, pick.name),
        el("span", { class: "pick-tag" }, "· " + tag),
      );
    }),
  );
  const tokens = player.redoTokens ?? 1;
  return el("div", { class: "roster" + (isActive ? " active" : "") },
    el("div", { class: "roster-head" },
      el("div", { class: "roster-name-wrap" },
        el("div", { class: "name" }, player.name),
        el("div", {
          class: "redo-badge " + (tokens > 0 ? "available" : "spent"),
          title: tokens > 0 ? "Redo token — one use only" : "Redo token spent",
        }, "↻"),
      ),
      el("div", { class: "total" }, `${total} team${total === 1 ? "" : "s"}`),
    ),
    grid,
  );
}

/* =========================================================================
   Reel mechanics — vertical slot machine
   ========================================================================= */
const ROW_H = 130;
const TRACK_CYCLES = 30; // how many cycles of remaining-teams we lay down in the track
let reelTrackEl = null;
let trackTeams = [];     // the team objects laid out top-to-bottom in the track
let trackY = 0;          // current track translateY (positive = scrolled up)
let spinSpeed = 0;
let spinRaf = null;
let lastFrameT = 0;

function buildTrack() {
  trackTeams = [];
  for (let i = 0; i < TRACK_CYCLES; i++) {
    trackTeams.push(...shuffle(state.remaining));
  }
}

function renderTrackDom() {
  reelTrackEl = document.getElementById("reel-track");
  if (!reelTrackEl) return;
  reelTrackEl.innerHTML = "";
  for (const t of trackTeams) {
    const color = TEAM_COLORS[t.code] || "#1e4fd2";
    const tint = color + "1A"; // ~10% alpha — solid light wash
    const row = el("div", {
      class: "reel-row",
      style: `--team-color: ${color}; --team-tint: ${tint};`,
    },
      el("span", { class: "flag" }, flagFor(t.code)),
      el("span", { class: "name" }, t.name),
    );
    reelTrackEl.appendChild(row);
  }
}

function setTrackY(y) {
  trackY = y;
  if (reelTrackEl) reelTrackEl.style.transform = `translateY(${-y}px)`;
}

/* Populate the reel with static content so the idle frame shows teams,
   not an empty placeholder. Called at end of renderDraw. */
function paintIdleReel() {
  if (state.remaining.length === 0) return;
  buildTrack();
  renderTrackDom();
  if (reelTrackEl) reelTrackEl.style.transition = "none";
  // Random starting row so the same team isn't always centered between picks
  const maxRow = Math.max(1, Math.min(state.remaining.length, trackTeams.length - 3));
  const startRow = Math.floor(Math.random() * maxRow);
  setTrackY(startRow * ROW_H);
  const idle = document.getElementById("reel-idle");
  if (idle) idle.style.display = "none";
}

function attachHoldHandlers(btn) {
  const start = (e) => {
    if (state.spinning || state.pendingPick || state.remaining.length === 0) return;
    e.preventDefault();
    startSpin();
    btn.classList.add("holding");
  };
  const end = (e) => {
    if (!state.spinning) return;
    e.preventDefault();
    stopSpin();
    btn.classList.remove("holding");
  };
  btn.addEventListener("pointerdown", start);
  btn.addEventListener("pointerup", end);
  btn.addEventListener("pointerleave", end);
  btn.addEventListener("pointercancel", end);
}

function handleKey(e) {
  if (state.phase !== "draw" && state.phase !== "pool") {
    if (e.type === "keydown" && (e.code === "Space" || e.code === "Enter")) {
      if (state.phase === "reveal") {
        e.preventDefault();
        commitReveal();
        return;
      }
      if (state.phase === "intro") {
        const btn = document.querySelector(".intro-continue.shown");
        if (btn) {
          e.preventDefault();
          introContinue();
        }
        return;
      }
      if (state.phase === "tierPreview") {
        e.preventDefault();
        previewContinue();
        return;
      }
      if (state.phase === "recap") {
        e.preventDefault();
        recapContinue();
        return;
      }
    }
    return;
  }
  if (e.code !== "Space") return;
  if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
  const btn = document.getElementById("spin-btn");
  if (!btn) return;
  if (e.type === "keydown" && !e.repeat) {
    if (state.spinning || state.pendingPick || state.remaining.length === 0) return;
    e.preventDefault();
    startSpin();
    btn.classList.add("holding");
  } else if (e.type === "keyup") {
    if (!state.spinning) return;
    e.preventDefault();
    stopSpin();
    btn.classList.remove("holding");
  }
}
window.addEventListener("keydown", handleKey);
window.addEventListener("keyup", handleKey);

function startSpin() {
  state.spinning = true;
  document.body.classList.add("spotlight");
  // Reuse track if paintIdleReel populated it; rebuild only if empty
  if (!reelTrackEl || trackTeams.length === 0) {
    buildTrack();
    renderTrackDom();
    setTrackY(0);
  }
  if (reelTrackEl) reelTrackEl.style.transition = "none";
  spinSpeed = 0;
  lastFrameT = performance.now();

  const tick = (t) => {
    if (!state.spinning) return;
    const dt = Math.max(0, t - lastFrameT);
    lastFrameT = t;
    // Accelerate to terminal velocity
    spinSpeed = Math.min(spinSpeed + dt * 6, 3800); // px/sec
    let nextY = trackY + (spinSpeed * dt) / 1000;
    const cycleH = state.remaining.length * ROW_H;
    const maxY = (TRACK_CYCLES - 10) * cycleH;
    if (nextY > maxY) nextY -= cycleH * 4;
    setTrackY(nextY);
    spinRaf = requestAnimationFrame(tick);
  };
  spinRaf = requestAnimationFrame(tick);
}

function stopSpin() {
  if (!state.spinning) return;
  state.spinning = false;
  cancelAnimationFrame(spinRaf);

  const finalPick = state.remaining[Math.floor(Math.random() * state.remaining.length)];
  const cycleH = state.remaining.length * ROW_H;

  // Find a future occurrence of finalPick in trackTeams, far enough ahead for dramatic decel
  const minTravelRows = Math.ceil((trackY + cycleH * 5) / ROW_H);
  let targetRow = -1;
  for (let r = minTravelRows; r < trackTeams.length; r++) {
    if (trackTeams[r].code === finalPick.code) { targetRow = r; break; }
  }
  if (targetRow < 0) {
    trackTeams.push(finalPick);
    renderTrackDom();
    targetRow = trackTeams.length - 1;
  }
  const targetTrackY = targetRow * ROW_H - ROW_H;

  if (reelTrackEl) {
    reelTrackEl.style.transition = `transform 2.8s ${getComputedStyle(document.documentElement).getPropertyValue("--ease-slot")}`;
    requestAnimationFrame(() => {
      setTrackY(targetTrackY);
    });
  }

  state.pendingPick = finalPick;
  // Deceleration ends at ~2.8s; hold the landed team for 0.7s of breath, then fade in the reveal.
  setTimeout(() => {
    showReveal(finalPick);
  }, 3500);
}

/* =========================================================================
   Reveal overlay
   ========================================================================= */
function showReveal(pick) {
  state.pendingPickFromPool = (state.phase === "pool");
  state.phase = "reveal";
  document.body.classList.remove("spotlight");
  render();
}

/* =========================================================================
   Redo token — one-use mulligan per player
   ========================================================================= */
function triggerRedo() {
  if (state.phase !== "reveal") return;
  const activeIdx = activePlayerIdx();
  const player = state.players[activeIdx];
  if (!player || (player.redoTokens ?? 0) <= 0) return;
  if (!state.pendingPick) return;

  player.redoTokens = 0;
  state.redoTeam = state.pendingPick;
  state.redoPlayer = activeIdx;
  // NOTE: pendingPick is already in state.remaining (commitReveal is what removes it).
  // Pushing it again would duplicate the team and skew the next spin's odds.
  state.pendingPick = null;
  state.phase = "redoing";
  render();

  setTimeout(() => {
    if (state.phase !== "redoing") return;
    state.redoTeam = null;
    state.redoPlayer = null;
    state.phase = state.pendingPickFromPool ? "pool" : "draw";
    state.pendingPickFromPool = false;
    render();
  }, 2300);
}

function renderRedoing(root) {
  // Render draw screen behind so it's visible during/after the takeover
  renderDraw(root);

  const player = state.players[state.redoPlayer];
  const team = state.redoTeam;
  if (!player || !team) return;
  const teamColor = TEAM_COLORS[team.code] || "#0a2540";

  const overlay = el("div", {
    class: "redo-stage",
    style: `--redo-color: ${teamColor};`,
  },
    el("div", { class: "redo-bg" }),
    el("div", { class: "redo-stamp" }, "REDO"),
    el("div", { class: "redo-meta" },
      el("div", { class: "redo-player" }, player.name + " rerolls"),
      el("div", { class: "redo-team" },
        el("span", { class: "redo-team-flag" }, flagFor(team.code)),
        el("span", { class: "redo-team-name" }, team.name),
      ),
    ),
    el("div", { class: "redo-token-flip" }, "↻"),
  );

  root.appendChild(overlay);
}

function renderReveal(root) {
  // Re-render draw screen behind so it's visible if reveal is dismissed
  renderDraw(root);

  const pick = state.pendingPick;
  if (!pick) return;
  const activeIdx = activePlayerIdx();
  const player = state.players[activeIdx];
  const isPoolPick = state.pendingPickFromPool === true;

  const teamColor = TEAM_COLORS[pick.code] || "#3a6fa0";
  const bg = darken(teamColor, 0.45);

  const tierLabel = isPoolPick
    ? "Pool"
    : TIERS[state.tierIndex].subtitle;

  const continueBtn = el("button", { class: "continue", onClick: commitReveal },
    "Continue");

  const canRedo = (player.redoTokens ?? 0) > 0;
  const redoBtn = canRedo
    ? el("button", { class: "redo-action", onClick: triggerRedo },
        "Use redo token",
        el("span", { class: "pill" }, "↻ 1"),
      )
    : null;

  const target = picksTargetThisPhase();
  const pickMeta = "[ Pick " + String(state.picksThisRound + 1).padStart(2, "0") + "/" +
    String(target).padStart(2, "0") + " · Round " +
    String(currentRound() + 1).padStart(2, "0") + " ]";

  const overlay = el("div", {
    class: "reveal",
    style: `--reveal-bg: ${bg}; background: ${bg};`,
  },
    el("div", { class: "reveal-inner" },
      el("div", { class: "eyebrow" }, "[ " + tierLabel + " ]"),
      el("div", { class: "picker-name" }, player.name),
      el("div", { class: "picker-verb" }, "drew"),
      el("div", { class: "pick-flag" }, flagFor(pick.code)),
      el("div", { class: "team" }, pick.name),
      el("div", { class: "pick-meta" }, pickMeta),
      continueBtn,
      el("div", { class: "keyhint" }, "[ Space ]"),
      redoBtn,
    ),
  );

  root.appendChild(overlay);
}

function commitReveal() {
  if (state.phase !== "reveal") return;
  const pick = state.pendingPick;
  const playerIdx = activePlayerIdx();
  const player = state.players[playerIdx];
  const fromPool = isPoolPhaseUnderlying();
  player.picks.push({
    name: pick.name,
    code: pick.code,
    tierIdx: state.tierIndex,
    fromPool,
  });
  state.newPickKey = `${playerIdx}-${pick.code}`;
  state.remaining = state.remaining.filter(t => t.code !== pick.code);
  state.pickCursor++;
  state.picksThisRound++;
  state.pendingPick = null;
  state.pendingPickFromPool = false;

  const target = fromPool
    ? state.players.length * POOL_PICKS_PER_PLAYER
    : state.players.length * PICKS_PER_PLAYER_PER_TIER;
  if (state.picksThisRound >= target) {
    // Phase ended
    if (fromPool) {
      // Whatever's still in the hat goes to The House
      state.house.picks = state.remaining.map(t => ({
        name: t.name,
        code: t.code,
        tierIdx: null,
        fromPool: true,
        fromHouse: true,
      }));
      state.remaining = [];
      state.phase = "done";
    } else {
      // Leftovers to the pool
      state.pool.push(...state.remaining);
      state.remaining = [];
      // Set up next bucket (intro will follow the recap)
      if (state.tierIndex >= TIERS.length - 1) {
        state.intoPool = true;
      } else {
        state.tierIndex++;
        state.intoPool = false;
      }
      state.pickOrder = shuffle(state.players.map((_, i) => i));
      state.phase = "recap";
    }
  } else {
    state.phase = fromPool ? "pool" : "draw";
  }
  render();
  setTimeout(() => { state.newPickKey = null; }, 800);
}

function isPoolPhaseUnderlying() {
  return state.pendingPickFromPool === true;
}

/* =========================================================================
   Modals — tier break, pool break
   ========================================================================= */
/* =========================================================================
   Tier intro — shows the pick order shuffling for the upcoming tier / pool
   ========================================================================= */
function renderIntro(root) {
  applyAccent();
  const isPool = state.intoPool === true;
  const tier = isPool ? null : TIERS[state.tierIndex];
  const tierLabel = isPool ? "Pool" : tier.name;
  const tierEyebrow = isPool ? "Final round" : tier.subtitle;
  // Show previous-tier summary only when there's something to summarize
  const hasPrev = state.pool.length > 0 || isPool;
  let prevEyebrow = "", prevSub = "";
  if (hasPrev) {
    if (isPool) {
      prevEyebrow = "All four tiers complete";
      prevSub = state.pool.length + " teams in the pool";
    } else {
      const prevTier = TIERS[state.tierIndex - 1];
      prevEyebrow = prevTier.subtitle + " complete";
      prevSub = state.pool.length + " in the pool";
    }
  }

  const continueLabel = isPool
    ? "Draw the pool"
    : (state.tierIndex === 0 ? "Begin " + tier.subtitle : "Continue to " + tier.subtitle);

  // Rows — start blank, the animation fills them in
  const rows = state.pickOrder.map((_, i) =>
    el("div", { class: "intro-row" },
      el("span", { class: "intro-num" }, String(i + 1).padStart(2, "0")),
      el("span", { class: "intro-name" }, "—"),
    )
  );

  const continueBtn = el("button", {
    class: "btn intro-continue",
    onClick: introContinue,
  }, continueLabel);

  const inner = el("div", { class: "intro-inner" },
    hasPrev
      ? el("div", { class: "intro-prev" },
          el("div", { class: "eyebrow" }, prevEyebrow),
          el("div", { class: "sub" }, prevSub),
        )
      : null,
    el("div", { class: "intro-eyebrow" }, tierEyebrow),
    el("h2", { class: "intro-heading" }, tierLabel),
    el("div", { class: "intro-sub" }, "Pick order"),
    el("div", { class: "intro-list" }, ...rows),
    continueBtn,
    el("div", { class: "intro-keyhint" }, "Space"),
  );

  root.appendChild(el("div", { class: "intro" }, inner));

  // Kick off the shuffle animation after a beat
  startIntroShuffle();
}

let introTimer = null;
function startIntroShuffle() {
  clearTimeout(introTimer);
  const rows = Array.from(document.querySelectorAll(".intro-row"));
  if (!rows.length) return;
  const finalOrder = state.pickOrder.slice();
  const names = state.players.map(p => p.name);

  let elapsed = 0;
  const decelStart = 1400;
  const totalDuration = 2400;

  function setRandomNames() {
    rows.forEach(row => {
      const nameEl = row.querySelector(".intro-name");
      if (!nameEl) return;
      nameEl.textContent = names[Math.floor(Math.random() * names.length)];
    });
  }

  function tick() {
    if (state.phase !== "intro") return;
    let interval;
    if (elapsed < decelStart) {
      interval = 75;
      setRandomNames();
    } else if (elapsed < totalDuration) {
      const progress = (elapsed - decelStart) / (totalDuration - decelStart);
      interval = 75 + progress * 280;
      setRandomNames();
    } else {
      // Lock in final order, one row at a time for a satisfying snap
      rows.forEach((row, i) => {
        const nameEl = row.querySelector(".intro-name");
        if (!nameEl) return;
        setTimeout(() => {
          if (state.phase !== "intro") return;
          nameEl.textContent = names[finalOrder[i]];
          row.classList.add("locked");
          if (i === rows.length - 1) {
            setTimeout(() => {
              if (state.phase !== "intro") return;
              document.querySelector(".intro-continue")?.classList.add("shown");
              document.querySelector(".intro-keyhint")?.classList.add("shown");
            }, 250);
          }
        }, i * 90);
      });
      return;
    }
    elapsed += interval;
    introTimer = setTimeout(tick, interval);
  }
  tick();
}

/* =========================================================================
   End-of-round recap — current rosters per player
   ========================================================================= */
function renderRecap(root) {
  applyAccent();
  const isPool = state.intoPool === true;
  const completedTierIdx = isPool ? TIERS.length - 1 : state.tierIndex - 1;
  const completedTier = TIERS[completedTierIdx];

  const eyebrow = "[ " + completedTier.subtitle + " · Complete ]";
  const poolCount = state.pool.length;
  const sub = poolCount > 0 ? poolCount + " in the pool" : null;

  const continueLabel = isPool ? "Continue to pool" : "Continue to " + TIERS[state.tierIndex].subtitle;

  const continueBtn = el("button", {
    class: "btn recap-continue",
    onClick: recapContinue,
  }, continueLabel);

  const cols = state.players.map((p, idx) => {
    const head = el("div", { class: "recap-col-head" },
      el("div", { class: "name" }, p.name),
      el("div", { class: "count" }, p.picks.length + " teams"),
    );
    let body;
    if (p.picks.length === 0) {
      body = el("div", { class: "recap-empty" }, "—");
    } else {
      const items = p.picks.map(pick => {
        const colorVar = pick.fromPool ? "--pool" : TIERS[pick.tierIdx].color;
        const isFresh = !pick.fromPool && pick.tierIdx === completedTierIdx;
        return el("div", {
          class: "recap-pick" + (isFresh ? " fresh" : ""),
          style: `--tier-color: var(${colorVar});`,
        },
          el("span", { class: "flag-sm" }, flagFor(pick.code)),
          el("span", {}, pick.name),
        );
      });
      body = el("div", { class: "recap-col-picks" }, ...items);
    }
    return el("div", { class: "recap-column" }, head, body);
  });

  // Add The House column from the tier-4 recap onward
  if (isPool) {
    const houseHead = el("div", { class: "recap-col-head" },
      el("div", { class: "name" }, "The House"),
      el("div", { class: "count" }, "Pending"),
    );
    const houseBody = el("div", { class: "recap-empty" }, "Pool leftovers");
    cols.push(el("div", { class: "recap-column house" }, houseHead, houseBody));
  }

  const inner = el("div", { class: "recap-inner" },
    el("div", { class: "recap-eyebrow" }, eyebrow),
    el("h2", { class: "recap-heading" }, "Round recap"),
    sub ? el("div", { class: "recap-sub" }, sub) : null,
    el("div", { class: "recap-grid" }, ...cols),
    continueBtn,
    el("div", { class: "recap-keyhint" }, "[ Space ]"),
  );

  root.appendChild(el("div", { class: "recap" }, inner));
}

function recapContinue() {
  if (state.phase !== "recap") return;
  state.phase = "intro";
  render();
}

function introContinue() {
  if (state.phase !== "intro") return;
  if (state.intoPool) {
    state.remaining = state.pool.slice();
  } else {
    state.remaining = TIERS[state.tierIndex].teams.map(([n, c]) => ({ name: n, code: c }));
  }
  state.pickCursor = 0;
  state.picksThisRound = 0;
  state.pendingPick = null;
  state.spinning = false;
  state.phase = "tierPreview";
  applyAccent();
  render();
}

function renderTierPreview(root) {
  applyAccent();
  const isPool = state.intoPool === true;
  const tier = isPool ? null : TIERS[state.tierIndex];
  const tierLabel = isPool ? "Pool" : tier.name;
  const eyebrow = isPool ? "Final round" : tier.subtitle;
  const teams = state.remaining;

  const cards = teams.map((t, i) => {
    const color = TEAM_COLORS[t.code] || "#0a2540";
    return el("div", {
      class: "preview-card",
      style: `--team-color: ${color}; animation-delay: ${(0.1 + i * 0.04).toFixed(2)}s;`,
    },
      el("span", { class: "preview-flag" }, flagFor(t.code)),
      el("span", { class: "preview-team" }, t.name),
    );
  });

  const inner = el("div", { class: "preview-inner" },
    el("div", { class: "preview-eyebrow" }, eyebrow),
    el("h2", { class: "preview-heading" }, tierLabel),
    el("div", { class: "preview-sub" }, teams.length + " teams in the hat"),
    el("div", { class: "preview-grid" }, ...cards),
    el("button", { class: "btn preview-continue", onClick: previewContinue }, "Begin spinning"),
    el("div", { class: "preview-keyhint" }, "Space"),
  );

  root.appendChild(el("div", { class: "preview" }, inner));
}

function previewContinue() {
  if (state.phase !== "tierPreview") return;
  state.phase = state.intoPool ? "pool" : "draw";
  render();
}

/* =========================================================================
   Final screen
   ========================================================================= */
function spawnConfetti(count) {
  const palette = ["#FF4F00", "#011818", "#1e4fd2", "#FF4F00", "#FFFFFF"];
  const existing = document.querySelectorAll(".confetti-piece");
  existing.forEach(p => p.remove());
  for (let i = 0; i < count; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    const size = 8 + Math.floor(Math.random() * 10);
    piece.style.left = (Math.random() * 100) + "vw";
    piece.style.width = size + "px";
    piece.style.height = size + "px";
    piece.style.background = palette[Math.floor(Math.random() * palette.length)];
    piece.style.animationDuration = (2.2 + Math.random() * 1.6).toFixed(2) + "s";
    piece.style.animationDelay = (Math.random() * 0.9).toFixed(2) + "s";
    document.body.appendChild(piece);
    // Clean up after animation finishes (max ~4s)
    setTimeout(() => piece.remove(), 5000);
  }
}

function renderFinal(root) {
  document.documentElement.style.setProperty("--accent", "var(--t1)");
  spawnConfetti(70);

  root.appendChild(el("div", { class: "brand" },
    el("div", { class: "mark" }, el("span", { class: "dot" }), el("span", {}, "Casa Baglioni")),
    el("span", {}, "Done"),
  ));

  const cards = state.players.map(p => {
    const sections = [];
    TIERS.forEach((_, ti) => {
      const picks = p.picks.filter(pk => pk.tierIdx === ti && !pk.fromPool);
      if (picks.length) sections.push({ label: TIERS[ti].subtitle, color: TIERS[ti].color, picks });
    });
    const poolPicks = p.picks.filter(pk => pk.fromPool);
    if (poolPicks.length) sections.push({ label: "Pool", color: "--pool", picks: poolPicks });

    return el("div", { class: "final-card" },
      el("h3", {}, p.name),
      el("div", { class: "ct" }, `${p.picks.length} teams`),
      ...sections.map(s => el("div", {
        class: "final-tier",
        style: `--tier-color: var(${s.color});`,
      },
        el("div", { class: "tier-label" }, s.label),
        el("div", { class: "roster-grid" },
          ...s.picks.map(pick => el("div", {
            class: "pick",
            style: `--tier-color: var(${s.color});`,
          },
            el("span", { class: "flag-sm" }, flagFor(pick.code)),
            pick.name,
          )),
        ),
      )),
    );
  });

  const housePicks = state.house?.picks || [];
  if (housePicks.length > 0) {
    const houseCard = el("div", { class: "final-card house" },
      el("h3", {}, "The House"),
      el("div", { class: "ct" }, housePicks.length + " teams · split pot"),
      el("div", { class: "final-tier", style: `--tier-color: var(--orange);` },
        el("div", { class: "tier-label" }, "Pool leftovers"),
        el("div", { class: "roster-grid" },
          ...housePicks.map(pick => el("div", {
            class: "pick",
            style: `--tier-color: var(--orange);`,
          },
            el("span", { class: "flag-sm" }, flagFor(pick.code)),
            el("span", { class: "pick-name" }, pick.name),
            el("span", { class: "pick-tag" }, "· House"),
          )),
        ),
      ),
    );
    cards.push(houseCard);
  }

  // Stagger the card entrances
  cards.forEach((c, i) => {
    c.style.animationDelay = (0.35 + i * 0.08).toFixed(2) + "s";
  });

  root.appendChild(el("div", { class: "final" },
    el("h1", {}, "Draw complete"),
    el("div", { class: "final-grid" }, ...cards),
    el("div", { class: "final-actions" },
      el("button", { class: "btn btn-final", onClick: downloadResults }, "Download .txt"),
      el("button", { class: "btn btn-ghost btn-final", onClick: (e) => copyResults(e.currentTarget) }, "Copy"),
      el("button", { class: "btn btn-ghost btn-final", onClick: resetAll }, "Reset"),
    ),
  ));
}

/* =========================================================================
   Save / restore — auto-snapshot to localStorage so a refresh doesn't lose
   the draw mid-flight.
   ========================================================================= */
const SAVE_KEY = "casa-baglioni-draw-v1";

function saveSnapshot() {
  if (state.phase === "setup") return;
  const snap = {
    v: 1,
    phase: (state.phase === "reveal" || state.phase === "redoing")
      ? (state.pendingPickFromPool ? "pool" : "draw")
      : state.phase,
    players: state.players,
    tierIndex: state.tierIndex,
    remaining: state.remaining,
    pickOrder: state.pickOrder,
    pickCursor: state.pickCursor,
    picksThisRound: state.picksThisRound,
    pool: state.pool,
    intoPool: state.intoPool || false,
    house: state.house || { name: "The House", picks: [] },
    ts: new Date().toISOString(),
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(snap)); } catch (_) {}
}

function loadSnapshot() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s.v !== 1) return null;
    return s;
  } catch (_) { return null; }
}

function clearSnapshot() {
  try { localStorage.removeItem(SAVE_KEY); } catch (_) {}
}

function restoreSnapshot(snap) {
  // Legacy phase names → unified intro phase
  let phase = snap.phase;
  if (phase === "tierBreak" || phase === "poolBreak") phase = "intro";
  state.phase = phase;
  state.players = snap.players.map(p => ({ redoTokens: 1, ...p }));
  state.tierIndex = snap.tierIndex;
  state.remaining = snap.remaining;
  state.pickOrder = snap.pickOrder;
  state.pickCursor = snap.pickCursor;
  state.picksThisRound = snap.picksThisRound;
  state.pool = snap.pool || [];
  state.intoPool = snap.intoPool === true || snap.phase === "poolBreak";
  state.house = snap.house || { name: "The House", picks: [] };
  state.pendingPick = null;
  state.pendingPickFromPool = false;
  state.spinning = false;
  state.newPickKey = null;
  render();
}

/* =========================================================================
   Export — text summary suitable for sharing
   ========================================================================= */
function buildResultsText() {
  const date = new Date().toLocaleDateString();
  const lines = [
    "Casa Baglioni · World Cup 2026 Draw",
    date,
    "",
  ];
  for (const p of state.players) {
    lines.push(`${p.name} (${p.picks.length})`);
    TIERS.forEach((tier, ti) => {
      const picks = p.picks.filter(pk => pk.tierIdx === ti && !pk.fromPool);
      if (picks.length) {
        lines.push(`  ${tier.subtitle}: ` +
          picks.map(pk => `${flagFor(pk.code)} ${pk.name}`).join(", "));
      }
    });
    const poolPicks = p.picks.filter(pk => pk.fromPool);
    if (poolPicks.length) {
      lines.push(`  Pool: ` +
        poolPicks.map(pk => `${flagFor(pk.code)} ${pk.name}`).join(", "));
    }
    lines.push("");
  }
  const housePicks = state.house?.picks || [];
  if (housePicks.length) {
    lines.push(`The House (${housePicks.length}) — split pot`);
    lines.push(`  ` + housePicks.map(pk => `${flagFor(pk.code)} ${pk.name}`).join(", "));
    lines.push("");
  }
  return lines.join("\n");
}

function downloadResults() {
  const text = buildResultsText();
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "casa-baglioni-draw.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function copyResults(btn) {
  const text = buildResultsText();
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = "Copied";
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }
  } catch (_) {
    // Fallback — open in a new window
    const w = window.open("", "_blank");
    if (w) { w.document.body.innerText = text; }
  }
}

function confirmReset() {
  const msg = state.phase === "done"
    ? "Start over? The current draw will be cleared."
    : "Reset the draw? Everyone's picks will be cleared.";
  if (window.confirm(msg)) resetAll();
}

function resetAll() {
  state.phase = "setup";
  state.players = [];
  state.tierIndex = 0;
  state.remaining = [];
  state.pickOrder = [];
  state.pickCursor = 0;
  state.picksThisRound = 0;
  state.spinning = false;
  state.pendingPick = null;
  state.pendingPickFromPool = false;
  state.newPickKey = null;
  state.pool = [];
  state.intoPool = false;
  state.redoTeam = null;
  state.redoPlayer = null;
  state.house = { name: "The House", picks: [] };
  document.body.classList.remove("spotlight");
  clearSnapshot();
  document.documentElement.style.setProperty("--accent", "var(--t1)");
  render();
}

/* =========================================================================
   Render dispatcher
   ========================================================================= */
const root = document.getElementById("app");

function render() {
  root.innerHTML = "";
  document.body.classList.toggle("setup-mode", state.phase === "setup");
  if (state.phase === "setup") renderSetup(root);
  else if (state.phase === "recap") renderRecap(root);
  else if (state.phase === "intro") renderIntro(root);
  else if (state.phase === "tierPreview") renderTierPreview(root);
  else if (state.phase === "draw") renderDraw(root);
  else if (state.phase === "reveal") renderReveal(root);
  else if (state.phase === "redoing") renderRedoing(root);
  else if (state.phase === "pool") renderDraw(root);
  else if (state.phase === "done") renderFinal(root);
  saveSnapshot();
}

// Auto-restore on load if a draw was in progress (skips the crest re-intro)
const _initialSnap = loadSnapshot();
if (_initialSnap && _initialSnap.phase && _initialSnap.phase !== "setup") {
  restoreSnapshot(_initialSnap);
} else {
  render();
}
</script>
